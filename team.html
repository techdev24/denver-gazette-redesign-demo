<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Team — The Denver Gazette</title>
<style>
:root{
  --ink:#0B0B0F; --ink-2:#1C1C22;
  --paper:#FAFAF7; --paper-2:#F2F1EA; --paper-3:#E9E8DF;
  --rule:#E2E1D8; --rule-2:#CFCEC4;
  --red:#C8102E; --mute:#646468; --muteer:#8C8C8E;
  /* set per-team by teams.js */
  --p:#0B0B0F; --s:#1C1C22; --accent:#C8102E;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{background:var(--paper);color:var(--ink);font-family:'Unify Sans','Helvetica Neue','Arial Nova',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{color:inherit;text-decoration:none;transition:color .2s}
img,svg{display:block;max-width:100%}
button{cursor:pointer;font:inherit;border:0;background:transparent;color:inherit}

/* ── masthead (matches homepage) ── */
.masthead{border-bottom:1px solid var(--rule);background:rgba(250,250,247,.97);position:sticky;top:0;z-index:50;-webkit-backdrop-filter:saturate(1.4) blur(8px);backdrop-filter:saturate(1.4) blur(8px)}
.mast-row{max-width:1400px;margin:0 auto;padding:12px 24px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:24px}
.mast-logo{display:flex;align-items:center;line-height:1}
.mast-logo .dg-img{height:46px;width:auto;display:block}
.mast-nav{display:flex;gap:20px;font-weight:500;font-size:14px}
.mast-nav a{padding:6px 0;border-bottom:2px solid transparent;transition:border-color .2s,color .2s}
.mast-nav a:hover{border-bottom-color:var(--red);color:var(--ink)}
.mast-actions{display:flex;gap:10px;justify-content:flex-end;align-items:center}
.icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--rule);display:grid;place-items:center;color:var(--ink-2);transition:all .2s}
.icon-btn:hover{border-color:var(--ink);background:var(--ink);color:var(--paper)}
.icon-btn svg{width:15px;height:15px}

/* ── team hero ── */
.team-hero{background:linear-gradient(135deg,var(--p) 0%,var(--p) 45%,var(--s) 100%);color:#fff;position:relative;overflow:hidden}
.team-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 85% 10%,rgba(255,255,255,.16),transparent 55%),linear-gradient(180deg,transparent 60%,rgba(0,0,0,.35));pointer-events:none}
.team-hero-inner{max-width:1400px;margin:0 auto;padding:40px 24px;display:flex;align-items:center;gap:28px;position:relative}
.team-hero-logo{width:104px;height:104px;object-fit:contain;filter:drop-shadow(0 6px 16px rgba(0,0,0,.4));flex-shrink:0}
.team-hero-text{min-width:0}
.team-hero-league{display:inline-block;background:rgba(255,255,255,.18);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;padding:5px 11px;border-radius:3px;margin-bottom:12px}
.team-hero-text h1{font-weight:900;font-size:clamp(34px,5vw,56px);line-height:.98;letter-spacing:-.02em;text-shadow:0 2px 8px rgba(0,0,0,.25)}
.team-hero-sub{margin-top:10px;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.team-hero-sub .live{display:inline-flex;align-items:center;gap:7px;font-weight:600}
.team-hero-sub .live::before{content:'';width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.team-hero-sub a{color:#fff;border-bottom:1px solid rgba(255,255,255,.4)}
.team-hero-sub a:hover{border-bottom-color:#fff}

/* ── breadcrumb ── */
.crumb{max-width:1400px;margin:0 auto;padding:14px 24px 0;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--mute)}
.crumb a:hover{color:var(--ink)}
.crumb span{color:var(--rule-2);margin:0 8px}

/* ── content shell ── */
main{max-width:1400px;margin:0 auto;padding:24px 24px 56px}

/* shared subtitle band */
.sbt{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);margin-top:8px;display:flex;align-items:center}
.sbt-cat{color:var(--accent);font-weight:600;border-left:3px solid var(--accent);padding-left:6px;line-height:1}
.kicker{font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}

/* lead story */
.lead{display:grid;grid-template-columns:1.5fr 1fr;gap:26px;align-items:center;padding-bottom:26px;margin-bottom:26px;border-bottom:3px solid var(--ink)}
.lead-img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:4px;background:#1F2937}
.lead-body{min-width:0}
.lead-h{font-weight:900;font-size:clamp(26px,3vw,38px);line-height:1.02;letter-spacing:-.015em;margin-top:10px;text-wrap:balance}
.lead:hover .lead-h{color:var(--accent)}
.lead-d{font-size:16px;line-height:1.5;color:var(--ink-2);margin-top:12px}

/* story grid */
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.tg-card{display:flex;flex-direction:column;border:1px solid var(--rule);border-radius:4px;overflow:hidden;background:var(--paper);transition:border-color .2s,transform .2s}
.tg-card:hover{border-color:var(--ink-2);transform:translateY(-2px)}
.tg-thumb{width:100%;aspect-ratio:16/9;background:#1F2937;overflow:hidden}
.tg-thumb img{width:100%;height:100%;object-fit:cover}
.tg-thumb--empty{background:repeating-linear-gradient(135deg,#2b2b33,#2b2b33 8px,#33333c 8px,#33333c 16px)}
.tg-c{padding:12px 14px 16px;display:flex;flex-direction:column;flex:1}
.tg-h{font-weight:900;font-size:15.5px;line-height:1.16;letter-spacing:-.003em;text-wrap:balance}
.tg-card:hover .tg-h{color:var(--accent)}

/* loading / message */
.team-msg{padding:48px 8px;text-align:center;color:var(--mute);font-size:15px}
.team-msg a{color:var(--accent);border-bottom:1px solid var(--accent)}

/* footer */
footer{padding:36px 24px 24px;border-top:1px solid var(--rule);background:var(--paper)}
.foot-bottom{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;font-size:11px;color:var(--mute);letter-spacing:.06em;text-transform:uppercase}
.foot-bottom .dds{color:var(--ink);font-weight:600}

@media (max-width:1000px){
  .tg{grid-template-columns:repeat(2,1fr)}
  .lead{grid-template-columns:1fr;gap:14px}
}
@media (max-width:680px){
  .mast-nav{display:none}
  .mast-row{grid-template-columns:auto 1fr auto;padding:10px 14px}
  main{padding:18px 14px 36px}
  .team-hero-inner{padding:28px 16px;gap:16px}
  .team-hero-logo{width:72px;height:72px}
  .tg{grid-template-columns:1fr}
}
</style>
</head>
<body>
<script src="assets/header.js?v=1"></script>

<!-- masthead -->
<!-- team hero (branded by teams.js) -->
<section class="team-hero">
  <div class="team-hero-inner">
    <img id="team-logo" class="team-hero-logo" src="" alt="" decoding="async">
    <div class="team-hero-text">
      <span class="team-hero-league" id="team-league">—</span>
      <h1 id="team-full">Loading…</h1>
      <div class="team-hero-sub">
        <span class="live">Live coverage</span>
        <span>Latest <span id="team-name">team</span> news, updated continuously</span>
        <a id="team-all" href="#" target="_blank" rel="noopener">All coverage on denvergazette.com →</a>
      </div>
    </div>
  </div>
</section>

<div class="crumb">
  <a href="index.html">Home</a><span>/</span><a href="sports.html">Sports</a><span>/</span><span id="team-name-crumb">Team</span>
</div>

<main>
  <!-- filled live by teams.js: lead story + .tg grid -->
  <div id="team-stories">
    <div class="team-msg">Loading the latest coverage…</div>
  </div>
</main>

<footer>
  <div class="foot-bottom">
    <span>© The Denver Gazette</span>
    <span class="dds">Powered by Digital Desk Services</span>
  </div>
</footer>

<script src="assets/teams.js?v=1" defer></script>
</body>
</html>
